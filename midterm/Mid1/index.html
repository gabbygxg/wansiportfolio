<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #signup{
    background-color: rgb(174, 172, 169);
    padding: 30px;
    margin: 30px;
    text-align: center;
    width: 500px;
    }
    #name{
        display: flex;
        gap: 6px;
        margin-bottom: 5px;
    }
    .nm{
        width: 50%;
    }
    #email{
        width: 98%;
    }
    #Sbutton{
        margin-top: 5px;
        background-color: blue;
        border-radius: 5px;
        width: 100%;
        height: 30px;
        color: aliceblue;
        font-weight: bold;
    }
    #Sbutton:hover{
        font-size: medium;
        background-color: rgb(38, 0, 255);
    }
    #sbar{
        margin-top: 10px;
        margin-bottom: 10px;
        margin-left: 5px;
        margin-right: 5px;
        background-color: blueviolet;
        padding: 5px;
        width: 800px;
    }
    #sbar a{
        text-decoration: none;
        color: aliceblue;
        margin-right: 20px;
    }
    #bar{
        margin-right: 20px;
        width: 75%;
        border-radius: 15px;
        border-style: none;
        padding: 5px;
    }
    #sbutton{
      float: inline-end;
      height:25px;
      background-color: blueviolet;
      border-color: aliceblue;
      color: aliceblue;
    }

</style>
<body>
<Div id="sbar">
    <a href="http://google.com">Home</a>
    <input id="bar" type="search" placeholder="search">
    <button id="sbutton">Download</button>

</Div>





    <Div id="signup">
        <div id="name">
            <input class="nm" type="text" placeholder="First name">
            <input class="nm" placeholder="Last name">
        </div>
        <input id = "email" type="email" placeholder="email">
        <button id = "Sbutton">sign up</button>
    </Div>


</body>
</html>
